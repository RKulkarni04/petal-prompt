<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petal Prompt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Petal Prompt</h1>
    <p class="subtitle">Ask one question and compare answers from GPT and Ollama ✨</p>

    <textarea id="questionInput" placeholder="Type your dreamy question here..."></textarea>
    <button id="submitBtn">Ask the AIs</button>

    <p id="statusMessage"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
